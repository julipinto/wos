<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1024">
<title>Slush Solver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,800;1,9..144,500;1,9..144,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d1f;
    --bg-2: #0f1230;
    --ink: #eef0ff;
    --ink-soft: #9aa0c8;
    --ink-mute: #565b85;
    --line: rgba(255,255,255,0.07);
    --line-2: rgba(255,255,255,0.12);
    --panel: rgba(255,255,255,0.03);
    --accent: #93d4ff;
    --accent-glow: rgba(147,212,255,0.5);
    --ok: #6ee7a8;
    --no: #ff8a8a;
    --warn: #ffc56e;

    --jar-w: 44px;
    --jar-h: 56px;
    --jar-sm-w: 36px;
    --jar-sm-h: 46px;
    --jar-cur-w: 40px;
    --jar-cur-h: 50px;
    --mini-w: 22px;
    --mini-h: 28px;

    --count-size: 72px;
    --brand-size: 26px;
    --pad-x: 14px;
    --pad-y: 18px;
    --max-w: 460px;
    --gap: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Mono', ui-monospace, monospace;
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(147,212,255,0.10), transparent 70%),
      radial-gradient(50% 40% at 90% 100%, rgba(192,164,255,0.08), transparent 70%),
      radial-gradient(40% 30% at 10% 80%, rgba(110,231,168,0.05), transparent 70%),
      var(--bg);
    background-attachment: fixed;
    color: var(--ink);
    min-height: 100vh;
    padding: var(--pad-y) var(--pad-x) 80px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 13% 22%, rgba(255,255,255,0.4), transparent 50%),
      radial-gradient(1px 1px at 47% 8%, rgba(255,255,255,0.3), transparent 50%),
      radial-gradient(1px 1px at 78% 38%, rgba(255,255,255,0.35), transparent 50%),
      radial-gradient(1px 1px at 23% 71%, rgba(255,255,255,0.3), transparent 50%),
      radial-gradient(1px 1px at 88% 86%, rgba(255,255,255,0.4), transparent 50%),
      radial-gradient(1px 1px at 62% 56%, rgba(255,255,255,0.25), transparent 50%);
    opacity: 0.7;
  }

  main { max-width: var(--max-w); margin: 0 auto; position: relative; }

  /* Work area: single column on mobile/tablet, two columns on desktop */
  .work-area { display: flex; flex-direction: column; }
  .col { display: flex; flex-direction: column; min-width: 0; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    padding: 0 4px;
  }
  .brand {
    display: flex; align-items: baseline; gap: 8px;
    font-family: 'Fraunces', serif;
  }
  .brand-mark {
    width: 22px; height: 22px;
    align-self: center;
    color: var(--accent);
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }
  .brand-name {
    font-size: var(--brand-size);
    font-weight: 800;
    font-style: italic;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-left: 2px;
  }
  .actions { display: flex; gap: 6px; }
  .ibtn {
    width: 34px; height: 34px;
    border: 1px solid var(--line-2);
    background: var(--panel);
    border-radius: 9px;
    color: var(--ink-soft);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .18s;
    font: inherit;
    backdrop-filter: blur(8px);
  }
  .ibtn:hover { color: var(--ink); border-color: rgba(255,255,255,0.22); }
  .ibtn:active { transform: scale(0.94); }
  .ibtn svg { width: 16px; height: 16px; }

  /* Panels */
  .panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 14px;
    backdrop-filter: blur(10px);
    position: relative;
  }
  .panel-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    color: var(--ink-mute);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .panel-bar .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); display: inline-block; margin-right: 6px; vertical-align: middle; }

  /* Palette */
  .palette {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 4px 0;
  }
  .jar {
    width: var(--jar-w);
    height: var(--jar-h);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform .15s ease, filter .15s ease;
    flex-shrink: 0;
  }
  .jar svg { width: 100%; height: 100%; display: block; pointer-events: none; }
  .jar:hover:not(.locked) { transform: translateY(-2px); }
  .jar:active:not(.locked) { transform: translateY(0) scale(0.96); }
  .jar.active {
    filter: drop-shadow(0 0 10px var(--accent-glow));
  }
  .jar.active::after { content: ""; }
  .jar.disabled {
    opacity: 0.25;
    filter: saturate(0.4) brightness(0.7);
    cursor: not-allowed;
  }
  .jar.disabled:hover { transform: none; }

  /* Won indicator — shown in place of the current row when all positions are confirmed */
  .won-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 0 6px;
    margin-top: 6px;
    border-top: 1px dashed rgba(110,231,168,0.22);
    color: var(--ok);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.02em;
  }
  .won-indicator svg {
    filter: drop-shadow(0 0 10px rgba(110,231,168,0.55));
  }

  .count-badge {
    position: absolute;
    top: -4px;
    right: -6px;
    background: var(--bg);
    border: 1px solid var(--line-2);
    color: var(--ink);
    font-size: 9px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    padding: 1px 5px;
    border-radius: 8px;
    line-height: 1.3;
    letter-spacing: 0.02em;
    pointer-events: none;
    backdrop-filter: blur(4px);
    z-index: 2;
  }
  .count-badge.depleted { color: var(--ink-mute); border-color: var(--line); }
  .count-badge.full { color: var(--accent); border-color: rgba(147,212,255,0.3); }

  /* Inventory editor */
  .inv-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }
  @media (min-width: 640px) {
    .inv-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  }
  @media (min-width: 1024px) {
    .inv-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  .inv-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 10px 6px 6px;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: rgba(255,255,255,0.025);
  }
  .inv-jar {
    width: 30px;
    height: 38px;
    cursor: default;
    flex-shrink: 0;
  }
  .inv-jar:hover { transform: none; }
  .inv-controls {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .inv-count {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 800;
    font-size: 17px;
    min-width: 18px;
    text-align: center;
    color: var(--ink);
  }
  .ibtn.small { width: 24px; height: 24px; font-size: 14px; border-radius: 7px; }
  .ibtn.small svg { width: 12px; height: 12px; }

  .inv-total {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-mute);
    text-align: center;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .inv-total b {
    color: var(--ink);
    font-weight: 500;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    letter-spacing: 0;
    margin: 0 4px;
  }
  .add-color-row {
    display: flex;
    justify-content: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .add-color-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: 1px dashed var(--line-2);
    background: transparent;
    color: var(--ink-soft);
    border-radius: 999px;
    font: inherit;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .18s;
  }
  .add-color-btn:hover { color: var(--accent); border-color: var(--accent-glow); }
  .add-color-btn svg { width: 12px; height: 12px; }

  /* Settings */
  .settings { display: none; }
  .settings.open { display: block; }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 2px;
  }
  .settings-row + .settings-row { border-top: 1px solid var(--line); }
  .settings-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .color-picker {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .color-picker.open { display: flex; }

  /* Rounds */
  .rounds-wrap { display: flex; flex-direction: column; gap: 6px; }
  .round {
    display: grid;
    grid-template-columns: 22px 1fr 28px;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-radius: 12px;
    transition: background .2s;
  }
  .round.current {
    background: linear-gradient(90deg, transparent, rgba(147,212,255,0.04), transparent);
    border-top: 1px dashed var(--line-2);
    padding-top: 12px;
    margin-top: 4px;
  }
  .round-num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    color: var(--ink-mute);
    font-size: 18px;
    text-align: center;
  }
  .slots {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: nowrap;
  }
  .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .slot .jar-small {
    width: var(--jar-sm-w);
    height: var(--jar-sm-h);
  }
  .round.current .slot .jar-small {
    width: var(--jar-cur-w);
    height: var(--jar-cur-h);
  }
  .fb {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-mute);
    font-size: 11px;
    font-weight: 700;
    transition: all .15s;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .fb.ok {
    background: rgba(110,231,168,0.18);
    border-color: rgba(110,231,168,0.55);
    color: var(--ok);
    box-shadow: 0 0 8px rgba(110,231,168,0.25);
  }
  .fb.no {
    background: rgba(255,138,138,0.18);
    border-color: rgba(255,138,138,0.55);
    color: var(--no);
    box-shadow: 0 0 8px rgba(255,138,138,0.25);
  }
  .row-action {
    display: flex; align-items: center; justify-content: center;
  }
  .submit {
    width: 30px; height: 30px;
    border-radius: 9px;
    border: 1px solid rgba(147,212,255,0.4);
    background: rgba(147,212,255,0.10);
    color: var(--accent);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .submit:disabled {
    opacity: 0.22;
    cursor: not-allowed;
    border-color: var(--line);
    background: transparent;
    color: var(--ink-mute);
    box-shadow: none;
  }
  .submit:not(:disabled):hover {
    box-shadow: 0 0 14px rgba(147,212,255,0.4);
    background: rgba(147,212,255,0.16);
  }
  .submit:not(:disabled):hover svg { transform: translateX(1px); }
  .submit svg { transition: transform .15s; }
  .del {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-mute);
    cursor: pointer;
    font-size: 10px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .del:hover { color: var(--no); border-color: rgba(255,138,138,0.4); }

  /* Locked slot in current row — confirmed by previous round, can't be edited */
  .round.current .slot.locked .jar {
    filter: drop-shadow(0 0 6px rgba(110,231,168,0.22));
  }
  .round.current .slot.locked .jar,
  .round.current .slot.locked .fb {
    cursor: default;
  }
  .round.current .slot.locked .fb {
    border-color: rgba(110,231,168,0.7);
    box-shadow: 0 0 10px rgba(110,231,168,0.35);
  }

  /* Solver */
  .count-wrap {
    text-align: center;
    padding: 8px 0 14px;
    position: relative;
  }
  .count-num {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-style: italic;
    font-size: var(--count-size);
    line-height: 0.95;
    letter-spacing: -0.05em;
    background: linear-gradient(180deg, #ffffff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: color .3s;
  }
  .count-num.solved {
    background: linear-gradient(180deg, #fff, var(--ok));
    -webkit-background-clip: text;
    background-clip: text;
  }
  .count-num.impossible {
    background: linear-gradient(180deg, #fff, var(--no));
    -webkit-background-clip: text;
    background-clip: text;
  }
  .count-num.large {
    font-size: calc(var(--count-size) * 0.78);
  }
  .count-label {
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-top: 6px;
  }

  .pos-grid {
    display: grid;
    grid-auto-columns: 1fr;
    grid-auto-flow: column;
    gap: 6px;
    margin-top: 12px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .pos-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 0;
  }
  .pos-tag {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-mute);
    margin-bottom: 2px;
  }
  .mini-jars {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: center;
  }
  .mini-jar {
    width: var(--mini-w);
    height: var(--mini-h);
    cursor: pointer;
    transition: opacity .18s ease, filter .18s ease;
  }
  .mini-jar:hover { transform: translateY(-1px); }
  .mini-jar.soft-out {
    opacity: 0.22;
    filter: saturate(0.55);
    cursor: default;
    pointer-events: none;
  }
  .mini-jar.soft-out:hover { transform: none; }
  .mini-jar-empty {
    width: var(--mini-w);
    height: var(--mini-h);
  }
  .pos-col.empty .pos-tag { color: var(--no); }
  .pos-empty {
    width: var(--mini-w); height: var(--mini-h);
    display: flex; align-items: center; justify-content: center;
    color: var(--no);
    font-size: 14px;
  }

  .suggest-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border: 1px solid var(--line-2);
    background: var(--panel);
    color: var(--ink-soft);
    border-radius: 999px;
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .18s;
  }
  .pill:hover:not(:disabled) { color: var(--accent); border-color: var(--accent-glow); }
  .pill:disabled { opacity: 0.3; cursor: not-allowed; }
  .pill svg { width: 14px; height: 14px; }

  /* Helper toast */
  .empty-hint {
    text-align: center;
    color: var(--ink-mute);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 0 2px;
  }

  /* ─── Tour modal (onboarding tutorial) ─── */
  .tour-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8, 10, 24, 0.78);
    backdrop-filter: blur(18px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .tour-overlay.open { opacity: 1; pointer-events: auto; }

  .tour-modal {
    position: relative;
    width: 100%;
    max-width: 380px;
    background: linear-gradient(180deg, #161a2e 0%, #0e1128 100%);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 22px;
    padding: 22px 22px 16px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 80px rgba(147,212,255,0.06);
    transform: translateY(12px) scale(0.97);
    transition: transform .3s ease;
  }
  .tour-overlay.open .tour-modal { transform: none; }

  .tour-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 28px;
    height: 28px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.03);
    color: var(--ink-mute);
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .tour-close:hover { color: var(--ink); border-color: var(--line-2); }

  .tour-content {
    position: relative;
    min-height: 290px;
  }
  .tour-slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 16px;
    padding-top: 8px;
    opacity: 0;
    transform: translateX(14px);
    transition: opacity .28s ease, transform .28s ease;
    pointer-events: none;
  }
  .tour-slide.active { opacity: 1; transform: none; pointer-events: auto; }
  .tour-slide.exit-left { transform: translateX(-14px); }

  .tour-visual {
    width: 100%;
    height: 175px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tour-visual svg { width: 100%; height: 100%; }

  .tour-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.02em;
    text-align: center;
    color: var(--ink);
    line-height: 1.1;
  }
  .tour-caption {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    text-align: center;
    line-height: 1.6;
    max-width: 280px;
  }

  .tour-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    gap: 12px;
  }
  .tour-text-btn {
    background: transparent;
    border: none;
    color: var(--ink-mute);
    cursor: pointer;
    font: inherit;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 8px 4px;
    transition: color .15s;
  }
  .tour-text-btn:hover { color: var(--ink-soft); }
  .tour-text-btn[disabled] { opacity: 0.3; cursor: default; }
  .tour-text-btn[disabled]:hover { color: var(--ink-mute); }

  .tour-cta {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    border: 1px solid rgba(147,212,255,0.4);
    background: rgba(147,212,255,0.10);
    color: var(--accent);
    border-radius: 999px;
    font: inherit;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s;
  }
  .tour-cta:hover {
    background: rgba(147,212,255,0.16);
    box-shadow: 0 0 14px rgba(147,212,255,0.4);
  }
  .tour-cta.final {
    color: var(--ok);
    border-color: rgba(110,231,168,0.4);
    background: rgba(110,231,168,0.10);
  }
  .tour-cta.final:hover {
    background: rgba(110,231,168,0.16);

  .tour-dots {
    display: flex;

    width: 5px;
    height: 5px;
    border-radius: 50%;

  }
  .tour-dot.active {
    background: var(--accent);
    width: 22px;
    border-radius: 3px;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* ─── Tour animations ─── */
  @keyframes t-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }
  .t-bob { animation: t-bob 2.4s ease-in-out infinite; transform-origin: center; }

  @keyframes t-pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(147,212,255,0)); }
    50% { transform: scale(1.06); filter: drop-shadow(0 0 10px rgba(147,212,255,0.6)); }
  }
  .t-pulse { animation: t-pulse 1.8s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

  @keyframes t-ripple {
    0% { r: 12; opacity: 0.6; }
    100% { r: 30; opacity: 0; }
  }
  .t-ripple { animation: t-ripple 1.8s ease-out infinite; }

  /* Place demo: a "ghost" jar moves from palette to a slot */
  @keyframes t-fly {
    0%, 8% { opacity: 0; transform: translate(var(--from-x), var(--from-y)); }
    14% { opacity: 1; transform: translate(var(--from-x), var(--from-y)) scale(1.12); }
    22% { opacity: 1; transform: translate(var(--from-x), var(--from-y)); }
    50% { opacity: 1; transform: translate(var(--to-x), var(--to-y)); }
    82% { opacity: 1; transform: translate(var(--to-x), var(--to-y)); }
    90% { opacity: 0; transform: translate(var(--to-x), var(--to-y)); }
    100% { opacity: 0; transform: translate(var(--from-x), var(--from-y)); }
  }
  .t-fly { animation: t-fly 3.6s ease-in-out infinite; }

  /* Feedback cycle: three dots overlap at the same position, each visible in turn */
  @keyframes t-fb-cycle {
    0%, 1% { opacity: 0; transform: scale(0.85); }
    4% { opacity: 1; transform: scale(1); }
    30% { opacity: 1; transform: scale(1); }
    33% { opacity: 0; transform: scale(0.85); }
    100% { opacity: 0; transform: scale(0.85); }
  }
  .t-fb {
    animation: t-fb-cycle 3s ease-in-out backwards infinite;
    transform-origin: center;
    transform-box: fill-box;
  }

  /* Tap cursor pulse */
  @keyframes t-tap {
    0%, 100% { opacity: 0; transform: scale(0.4); }
    20% { opacity: 0.5; transform: scale(1.4); }
    40% { opacity: 0; transform: scale(2); }
  }
  .t-tap { animation: t-tap 3.6s ease-out infinite; transform-origin: center; transform-box: fill-box; }

  /* Count number animation: decreases over time */
  @keyframes t-count {
    0% { content: '120'; }
    25% { content: '32'; }
    50% { content: '8'; }
    75% { content: '2'; }
    100% { content: '1'; }
  }
  .t-count::after { content: '120'; animation: t-count 4s steps(1, end) infinite; }

  @keyframes t-fade-cycle {
    0%, 4% { opacity: 0; }
    10% { opacity: 1; }
    32% { opacity: 1; }
    40% { opacity: 0; }
    100% { opacity: 0; }
  }
  .t-fade-cycle { animation: t-fade-cycle 4s ease-in-out infinite; }

  @keyframes t-fade-in-out {
    0%, 10% { opacity: 0.18; }
    50% { opacity: 1; }
    100% { opacity: 0.18; }
  }
  .t-fade { animation: t-fade-in-out 3s ease-in-out infinite; }

  /* ─── Small mobile (<380px): everything one step smaller ─── */
  @media (max-width: 380px) {

<!-- Tour modal — opens on first visit and via the help (?) button -->

<script>
  // ---------- Constants ----------
  const DEFAULT_INVENTORY = [
    '#ef4444', // red
    '#fb923c', // orange
    '#f472b6', // pink
    '#60a5fa', // blue
    '#c084fc', // purple
    '#4ade80', // green
  ];
  const COLOR_POOL = [
    ...DEFAULT_INVENTORY,
    '#facc15', // yellow
    '#22d3ee', // cyan
    '#a3e635', // lime
    '#fb7185', // rose
    '#fcd34d', // amber
    '#a78bfa', // violet
  ];
  const MAX_JARS = 8;
  const MIN_JARS = 2;

  // ---------- State ----------
  // Inventory is an array of hex strings (one per physical jar).
  // Duplicates allowed: ['#ef4444','#ef4444','#60a5fa','#4ade80','#c084fc'] means 2 red + 1 each of blue/green/purple.
  const state = {
    inventory: [...DEFAULT_INVENTORY],
    rounds: [],
    currentGuess: [],
    currentFeedback: [],
  };

  function positions() { return state.inventory.length; }

  function getConfirmedPositions() {
    // For each position, if any past round had feedback === true there,
    // return the (locked) color for that position.
    const N = positions();
    const result = Array(N).fill(null);
    for (const round of state.rounds) {
      for (let i = 0; i < N; i++) {
        if (round.feedback[i] === true) result[i] = round.guess[i];
      }
    }
    return result;
  }

  function initCurrent() {
    const N = positions();
    state.currentGuess = Array(N).fill(null);
    state.currentFeedback = Array(N).fill(null);
    // Pre-fill positions that are already confirmed (✓) from past rounds — they're locked.
    const confirmed = getConfirmedPositions();
    for (let i = 0; i < N; i++) {
      if (confirmed[i]) {
        state.currentGuess[i] = confirmed[i];
        state.currentFeedback[i] = true;
      }
    }
  }
  initCurrent();

  // Returns the index of the first empty unlocked slot (left-to-right), or -1 if none.
  function firstEmptySlot() {
    const N = positions();
    const confirmed = getConfirmedPositions();
    for (let i = 0; i < N; i++) {
      if (confirmed[i] !== null) continue; // locked
      if (state.currentGuess[i] === null) return i;
    }
    return -1;
  }

  // ---------- Inventory helpers ----------
  function inventoryCounts() {
    const m = new Map();
    for (const h of state.inventory) m.set(h, (m.get(h) || 0) + 1);
    return m;
  }
  function uniqueColors() {
    const seen = new Set();
    const out = [];
    for (const h of state.inventory) {
      if (!seen.has(h)) { seen.add(h); out.push(h); }
    }
    return out;
  }
  function remainingCounts() {
    const m = inventoryCounts();
    for (const placed of state.currentGuess) {
      if (placed) m.set(placed, (m.get(placed) || 0) - 1);
    }
    return m;
  }

  // ---------- Color helpers ----------
  function shade(hex, percent) {
    const num = parseInt(hex.replace('#',''), 16);
    const amt = Math.round(2.55 * percent);
    let r = (num >> 16) + amt;
    let g = (num >> 8 & 0x00FF) + amt;
    let b = (num & 0x0000FF) + amt;
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return '#' + ((r<<16) | (g<<8) | b).toString(16).padStart(6, '0');
  }

  function jarSVG(hex) {
    if (!hex) {
      return `<svg viewBox="0 0 40 52" xmlns="http://www.w3.org/2000/svg">
        <rect x="11" y="3" width="18" height="6" rx="1.5" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="2 2"/>
        <path d="M 5 16 Q 5 11 10 11 L 30 11 Q 35 11 35 16 L 35 46 Q 35 50 31 50 L 9 50 Q 5 50 5 46 Z"
              fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="3 3"/>
      </svg>`;
    }
    const darken = shade(hex, -25);
    return `<svg viewBox="0 0 40 52" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="2" width="20" height="7" rx="1.5" fill="#2a2f4a"/>
      <rect x="10" y="2" width="20" height="2" fill="rgba(255,255,255,0.18)"/>
      <rect x="10" y="7" width="20" height="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="12" y="9" width="16" height="3" fill="${darken}"/>
      <path d="M 5 16 Q 5 12 10 12 L 30 12 Q 35 12 35 16 L 35 46 Q 35 50 31 50 L 9 50 Q 5 50 5 46 Z"
            fill="${hex}"/>
      <path d="M 5 16 Q 5 12 10 12 L 30 12 Q 35 12 35 16 L 35 18 L 5 18 Z" fill="rgba(0,0,0,0.18)"/>
      <ellipse cx="13" cy="30" rx="2.5" ry="11" fill="rgba(255,255,255,0.3)"/>
      <ellipse cx="13" cy="30" rx="1" ry="9" fill="rgba(255,255,255,0.4)"/>
      <rect x="9" y="28" width="22" height="10" fill="rgba(255,255,255,0.08)"/>
      <rect x="9" y="28" width="22" height="1" fill="rgba(255,255,255,0.15)"/>
      <rect x="9" y="37" width="22" height="1" fill="rgba(0,0,0,0.15)"/>
      <path d="M 5 44 L 35 44 L 35 46 Q 35 50 31 50 L 9 50 Q 5 50 5 46 Z" fill="rgba(0,0,0,0.2)"/>
    </svg>`;
  }

  // ---------- Solver ----------
  // Enumerates permutations of the inventory multiset that satisfy per-position constraints.
  function solve() {
    const N = positions();
    const emptyResult = { valid: [], perPosition: Array(N).fill().map(() => []), total: 0 };
    if (N === 0) return emptyResult;

    // Build constraints
    const confirmed = Array(N).fill(null);
    const wrong = Array(N).fill().map(() => new Set());
    let contradiction = false;
    for (const round of state.rounds) {
      for (let i = 0; i < N; i++) {
        if (round.feedback[i] === true) {
          if (confirmed[i] !== null && confirmed[i] !== round.guess[i]) contradiction = true;
          confirmed[i] = round.guess[i];
        }
        if (round.feedback[i] === false) wrong[i].add(round.guess[i]);
      }
    }
    for (let i = 0; i < N; i++) {
      if (confirmed[i] !== null && wrong[i].has(confirmed[i])) contradiction = true;
    }
    if (contradiction) return emptyResult;

    // Check confirmed counts fit inventory
    const invCounts = inventoryCounts();
    const confCounts = new Map();
    for (const c of confirmed) if (c !== null) confCounts.set(c, (confCounts.get(c) || 0) + 1);
    for (const [c, ct] of confCounts) {
      if ((invCounts.get(c) || 0) < ct) return emptyResult;
    }

    // Backtracking permutation enumeration on sorted inventory
    const valid = [];
    const perPosition = Array(N).fill().map(() => new Set());
    const inv = [...state.inventory].sort();
    const cur = [];
    const LIMIT = 50000;
    let truncated = false;

    function bt(remaining) {
      if (valid.length >= LIMIT) { truncated = true; return; }
      const pos = cur.length;
      if (remaining.length === 0) {
        valid.push([...cur]);
        for (let i = 0; i < N; i++) perPosition[i].add(cur[i]);
        return;
      }
      const seen = new Set();
      for (let i = 0; i < remaining.length; i++) {
        const c = remaining[i];
        if (seen.has(c)) continue;
        seen.add(c);
        if (confirmed[pos] !== null && confirmed[pos] !== c) continue;
        if (wrong[pos].has(c)) continue;
        cur.push(c);
        bt(remaining.slice(0, i).concat(remaining.slice(i + 1)));
        cur.pop();
        if (valid.length >= LIMIT) { truncated = true; return; }
      }
    }
    bt(inv);

    return {
      valid,
      perPosition: perPosition.map(s => [...s]),
      total: valid.length,
      truncated,
    };
  }

  function suggestBestGuess(possibilities) {
    if (possibilities.length <= 1) return possibilities[0] || null;
    const limit = 600;
    const candidates = possibilities.length > limit ? possibilities.slice(0, limit) : possibilities;
    const sample = possibilities.length > 1500 ? possibilities.slice(0, 1500) : possibilities;
    let best = candidates[0], bestScore = Infinity;
    for (const guess of candidates) {
      const groups = new Map();
      for (const sol of sample) {
        let sig = 0;
        for (let i = 0; i < guess.length; i++) if (sol[i] === guess[i]) sig |= (1 << i);
        groups.set(sig, (groups.get(sig) || 0) + 1);
      }
      let worst = 0;
      for (const v of groups.values()) if (v > worst) worst = v;
      if (worst < bestScore) { bestScore = worst; best = guess; }
    }
    return best;
  }

  // ---------- Render ----------
  let cachedSolution = null;

  function render() {
    renderPalette();
    renderRounds();
    renderSolver();
    renderSettings();
  }

  function renderPalette() {
    const el = document.getElementById('palette');
    el.innerHTML = '';
    const totals = inventoryCounts();
    const remaining = remainingCounts();
    for (const hex of uniqueColors()) {
      const total = totals.get(hex) || 0;
      const rem = remaining.get(hex) || 0;
      const slotAvailable = firstEmptySlot() !== -1;
      const jar = document.createElement('div');
      let cls = 'jar';
      if (rem === 0 || !slotAvailable) cls += ' disabled';
      jar.className = cls;
      let badge = '';
      if (total > 1) {
        const badgeCls = rem === 0 ? 'depleted' : (rem === total ? 'full' : '');
        badge = `<div class="count-badge ${badgeCls}">${rem}/${total}</div>`;
      }
      jar.innerHTML = jarSVG(hex) + badge;
      jar.onclick = () => {
        if (rem === 0) return; // out of stock
        const slot = firstEmptySlot();
        if (slot === -1) return; // no empty unlocked slot
        state.currentGuess[slot] = hex;
        renderPalette();
        renderRounds();
        renderPosGrid();
      };
      el.appendChild(jar);
    }
  }

  function renderRounds() {
    const el = document.getElementById('rounds');
    el.innerHTML = '';

    state.rounds.forEach((round, ri) => {
      const row = document.createElement('div');
      row.className = 'round';
      row.innerHTML = `<div class="round-num">${ri + 1}</div>`;
      const slots = document.createElement('div');
      slots.className = 'slots';
      round.guess.forEach((hex, i) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        const jar = document.createElement('div');
        jar.className = 'jar jar-small locked';
        jar.innerHTML = jarSVG(hex);
        const fb = document.createElement('div');
        const f = round.feedback[i];
        fb.className = 'fb ' + (f === true ? 'ok' : f === false ? 'no' : '');
        fb.innerHTML = f === true ? '✓' : f === false ? '✕' : '';
        slot.appendChild(jar);
        slot.appendChild(fb);
        slots.appendChild(slot);
      });
      row.appendChild(slots);
      const action = document.createElement('div');
      action.className = 'row-action';
      const del = document.createElement('button');
      del.className = 'del';
      del.innerHTML = '✕';
      del.setAttribute('aria-label', 'Delete round');
      del.onclick = () => { state.rounds.splice(ri, 1); initCurrent(); render(); };
      action.appendChild(del);
      row.appendChild(action);
      el.appendChild(row);
    });

    // Current row — skip entirely if the puzzle is won (all positions confirmed by past rounds)
    const N = positions();
    const confirmedPositions = getConfirmedPositions();
    const isWon = N > 0 && confirmedPositions.every(c => c !== null);

    if (isWon) {
      const won = document.createElement('div');
      won.className = 'won-indicator';
      won.innerHTML = `
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" stroke-opacity="0.5"/>
          <polyline points="8 12 11 15 16 9"/>
        </svg>
        <span>solved</span>
      `;
      el.appendChild(won);
      return;
    }

    // Current row
    const cur = document.createElement('div');
    cur.className = 'round current';
    cur.innerHTML = `<div class="round-num">${state.rounds.length + 1}</div>`;
    const curSlots = document.createElement('div');
    curSlots.className = 'slots';
    state.currentGuess.forEach((hex, i) => {
      const isLocked = confirmedPositions[i] !== null;
      const slot = document.createElement('div');
      slot.className = 'slot' + (isLocked ? ' locked' : '');
      const jar = document.createElement('div');
      jar.className = 'jar jar-small' + (isLocked ? ' locked' : '');
      jar.innerHTML = jarSVG(hex);
      if (!isLocked) {
        jar.onclick = () => {
          // Tap filled slot to return that jar to the palette ("queue")
          if (state.currentGuess[i] !== null) {
            state.currentGuess[i] = null;
            renderPalette();
            renderRounds();
            renderPosGrid();
          }
          // Empty slot tap is a no-op — pick a color from the palette instead
        };
      }
      const fb = document.createElement('button');
      const f = state.currentFeedback[i];
      fb.className = 'fb ' + (f === true ? 'ok' : f === false ? 'no' : '');
      fb.innerHTML = f === true ? '✓' : f === false ? '✕' : '';
      if (isLocked) {
        fb.disabled = true;
        fb.style.cursor = 'default';
      } else {
        fb.onclick = () => {
          const cf = state.currentFeedback[i];
          state.currentFeedback[i] = cf === null ? true : cf === true ? false : null;
          renderRounds();
        };
      }
      slot.appendChild(jar);
      slot.appendChild(fb);
      curSlots.appendChild(slot);
    });
    cur.appendChild(curSlots);

    const action = document.createElement('div');
    action.className = 'row-action';
    const submit = document.createElement('button');
    submit.className = 'submit';
    submit.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="18" y2="12"/><polyline points="12 6 18 12 12 18"/></svg>`;
    const allFilled = state.currentGuess.every(c => c !== null) && state.currentFeedback.every(f => f !== null);
    submit.disabled = !allFilled;
    submit.onclick = () => {
      if (!allFilled) return;
      state.rounds.push({
        guess: [...state.currentGuess],
        feedback: [...state.currentFeedback]
      });
      initCurrent();
      render();
    };
    action.appendChild(submit);
    cur.appendChild(action);
    el.appendChild(cur);
  }

  function renderSolver() {
    const result = solve();
    cachedSolution = result;
    const countEl = document.getElementById('count-num');
    const labelEl = document.getElementById('count-label');
    const suggestBtn = document.getElementById('suggest-btn');

    const total = result.total;
    countEl.className = 'count-num';
    if (total > 9999) countEl.className += ' large';
    countEl.textContent = total === 0 ? '0' : total.toLocaleString() + (result.truncated ? '+' : '');
    countEl.classList.remove('pop');
    void countEl.offsetWidth;
    countEl.classList.add('pop');

    if (total === 1) {
      countEl.classList.add('solved');
      labelEl.textContent = 'solved';
    } else if (total === 0) {
      countEl.classList.add('impossible');
      labelEl.textContent = 'no solution';
    } else {
      labelEl.textContent = 'possibilities';
    }

    suggestBtn.disabled = !(result.valid && result.valid.length > 0);
    renderPosGrid();
  }

  // Renders the per-position summary. Two visual tiers:
  //   • normal jar  → this color is still selectable for this slot
  //   • faded jar   → this color is allowed at this position in principle, but
  //                   right now the inventory is exhausted by other slots
  //                   (uncommit a slot somewhere else and it'll un-fade)
  // Colors that past rounds proved impossible at a position are removed entirely
  // (no placeholder, no gap). Columns stack their possibles in inventory order
  // so the same color tends to land in the same row across columns.
  function renderPosGrid() {
    const grid = document.getElementById('pos-grid');
    if (!grid || !cachedSolution) return;
    const N = positions();
    const partial = state.currentGuess;
    const colorOrder = uniqueColors();

    // HARD possibilities — what each position could be given ONLY past rounds.
    // We build this from the full valid set (not filtered by the partial).
    const hardPerPos = Array(N).fill().map(() => new Set());
    for (const sol of cachedSolution.valid) {
      for (let i = 0; i < N; i++) hardPerPos[i].add(sol[i]);
    }

    grid.innerHTML = '';
    for (let i = 0; i < N; i++) {
      const col = document.createElement('div');
      col.className = 'pos-col' + (hardPerPos[i].size === 0 ? ' empty' : '');
      const tag = document.createElement('div');
      tag.className = 'pos-tag';
      tag.textContent = (i + 1);
      col.appendChild(tag);
      const minis = document.createElement('div');
      minis.className = 'mini-jars';

      if (hardPerPos[i].size === 0) {
        // Past rounds ruled out every color at this position — contradiction
        const x = document.createElement('div');
        x.className = 'pos-empty';
        x.textContent = '✕';
        minis.appendChild(x);
      } else {
        // Availability of each color if placed at slot i (subtract other slots only)
        const counts = inventoryCounts();
        for (let k = 0; k < N; k++) {
          if (k === i) continue;
          const c = state.currentGuess[k];
          if (c) counts.set(c, (counts.get(c) || 0) - 1);
        }
        for (const hex of colorOrder) {
          if (!hardPerPos[i].has(hex)) continue; // hard-impossible — erase

          const isPlaced = partial[i] === hex;
          const isAvailable = (counts.get(hex) || 0) > 0;

          const j = document.createElement('div');
          j.className = 'jar mini-jar';
          if (isPlaced) j.classList.add('active');
          else if (!isAvailable) j.classList.add('soft-out');
          j.innerHTML = jarSVG(hex);

          if (isPlaced || isAvailable) {
            j.title = 'Place at slot ' + (i + 1);
            j.onclick = () => {
              // Re-check at click time (state may have shifted)
              const counts2 = inventoryCounts();
              for (let k = 0; k < state.currentGuess.length; k++) {
                if (k === i) continue;
                const c = state.currentGuess[k];
                if (c) counts2.set(c, (counts2.get(c) || 0) - 1);
              }
              if ((counts2.get(hex) || 0) > 0) {
                state.currentGuess[i] = hex;
                renderRounds();
                renderPalette();
                renderPosGrid();
              }
            };
          }
          minis.appendChild(j);
        }
      }
      col.appendChild(minis);
      grid.appendChild(col);
    }
  }

  function renderSettings() {
    const grid = document.getElementById('inv-grid');
    grid.innerHTML = '';
    const counts = inventoryCounts();
    const uniques = uniqueColors();
    for (const hex of uniques) {
      const count = counts.get(hex);
      const row = document.createElement('div');
      row.className = 'inv-row';
      const jar = document.createElement('div');
      jar.className = 'jar inv-jar';
      jar.innerHTML = jarSVG(hex);
      const controls = document.createElement('div');
      controls.className = 'inv-controls';
      const minus = document.createElement('button');
      minus.className = 'ibtn small';
      minus.innerHTML = '−';
      minus.disabled = state.inventory.length <= MIN_JARS;
      minus.onclick = () => {
        if (state.inventory.length <= MIN_JARS) return;
        const idx = state.inventory.indexOf(hex);
        if (idx >= 0) {
          state.inventory.splice(idx, 1);
          state.rounds = [];
          initCurrent();
          render();
        }
      };
      const num = document.createElement('span');
      num.className = 'inv-count';
      num.textContent = count;
      const plus = document.createElement('button');
      plus.className = 'ibtn small';
      plus.innerHTML = '+';
      plus.disabled = state.inventory.length >= MAX_JARS;
      plus.onclick = () => {
        if (state.inventory.length >= MAX_JARS) return;
        state.inventory.push(hex);
        state.rounds = [];
        initCurrent();
        render();
      };
      controls.appendChild(minus);
      controls.appendChild(num);
      controls.appendChild(plus);
      row.appendChild(jar);
      row.appendChild(controls);
      grid.appendChild(row);
    }

    const total = document.getElementById('inv-total');
    total.innerHTML = `total<b>${state.inventory.length}</b>${state.inventory.length === 1 ? 'jar' : 'jars'}`;

    const addBtn = document.getElementById('add-color-btn');
    addBtn.disabled = state.inventory.length >= MAX_JARS;
    addBtn.style.opacity = addBtn.disabled ? '0.4' : '';
  }

  function buildColorPicker() {
    const picker = document.getElementById('color-picker');
    picker.innerHTML = '';
    const used = new Set(state.inventory);
    const pool = COLOR_POOL.filter(h => !used.has(h));
    if (pool.length === 0) {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:10px;color:var(--ink-mute);letter-spacing:0.18em;text-transform:uppercase;padding:10px;text-align:center;width:100%;';
      note.textContent = 'all colors in use';
      picker.appendChild(note);
      return;
    }
    pool.forEach(hex => {
      const j = document.createElement('div');
      j.className = 'jar inv-jar';
      j.style.cursor = 'pointer';
      j.innerHTML = jarSVG(hex);
      j.title = 'Add to inventory';
      j.onclick = () => {
        if (state.inventory.length >= MAX_JARS) return;
        state.inventory.push(hex);
        state.rounds = [];
        initCurrent();
        picker.classList.remove('open');
        render();
      };
      picker.appendChild(j);
    });
  }

  // ---------- Events ----------
  document.getElementById('settings-btn').onclick = () => {
    document.getElementById('settings').classList.toggle('open');
  };

  document.getElementById('reset-btn').onclick = () => {
    state.rounds = [];
    initCurrent();
    render();
  };

  document.getElementById('add-color-btn').onclick = () => {
    if (state.inventory.length >= MAX_JARS) return;
    const picker = document.getElementById('color-picker');
    picker.classList.toggle('open');
    if (picker.classList.contains('open')) buildColorPicker();
  };

  document.getElementById('suggest-btn').onclick = () => {
    if (!cachedSolution || !cachedSolution.valid || cachedSolution.valid.length === 0) return;
    const best = suggestBestGuess(cachedSolution.valid);
    if (best) {
      const N = positions();
      state.currentGuess = [...best];
      state.currentFeedback = Array(N).fill(null);
      // Re-lock feedback ✓ on positions already confirmed by past rounds.
      const confirmed = getConfirmedPositions();
      for (let i = 0; i < N; i++) {
        if (confirmed[i]) state.currentFeedback[i] = true;
      }
      renderRounds();
      renderPalette();
    }
  };

  // ===== Tour / Tutorial =====

  }

  function slotInner() {

            fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="3 3"/>

  function vPlace() {

  function vFeedback() {
    // A single slot with jar + cycling feedback dots below
    let svg = `<svg viewBox="0 0 320 175" xmlns="http://www.w3.org/2000/svg">`;
    // Three slots in a row, with cycling feedbacks
    const colors = ['#ef4444', '#60a5fa', '#4ade80'];
    colors.forEach((c, i) => {
      const x = 70 + i * 65;
      svg += `<g transform="translate(${x}, 30)">${jarInner(c)}</g>`;
    });
    // Below each slot, three feedback dot variants overlapping; CSS rotates which is visible
    colors.forEach((_, i) => {
      const cx = 70 + i * 65 + 20;
      const cy = 110;
      // Three feedback variants share the same spot; each is visible for ~0.8s
      // of a 3s cycle, with the next one snapping in 1s later (no overlap).
      // Columns are offset by 0.4s for a gentle "wave" across the row.
      const colPhase = i * 0.4;
      const variants = [
        { delay: colPhase, content: `<circle r="11" fill="transparent" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>` },
        { delay: colPhase + 1.0, content: `<circle r="11" fill="rgba(110,231,168,0.22)" stroke="rgba(110,231,168,0.65)" stroke-width="1.2"/>
          <polyline points="-4 0 -1 3 4 -3" fill="none" stroke="#6ee7a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>` },
        { delay: colPhase + 2.0, content: `<circle r="11" fill="rgba(255,138,138,0.22)" stroke="rgba(255,138,138,0.65)" stroke-width="1.2"/>
          <line x1="-4" y1="-4" x2="4" y2="4" stroke="#ff8a8a" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="-4" x2="-4" y2="4" stroke="#ff8a8a" stroke-width="2" stroke-linecap="round"/>` },
      ];
      for (const v of variants) {
        svg += `<g transform="translate(${cx}, ${cy})">
          <g class="t-fb" style="animation-delay: ${v.delay.toFixed(2)}s;">${v.content}</g>
        </g>`;
      }
    });
    svg += `</svg>`;
    return svg;
  }

  function vSolver() {
    // Big "X possibilities" number that decreases, with a grid of mini jars fading
    return `<svg viewBox="0 0 320 175" xmlns="http://www.w3.org/2000/svg">
      <defs>
        ${[0,1,2,3].map(i => `
          <linearGradient id="tg-grad${i}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="30%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="${i === 3 ? '#6ee7a8' : '#93d4ff'}"/>
          </linearGradient>
        `).join('')}
      </defs>

      <!-- Four overlapping numbers, each cycling visibility at staggered delays -->
      ${['120', '32', '8', '1'].map((n, i) => `
        <text x="160" y="62" text-anchor="middle"
              font-family="Fraunces, serif" font-style="italic" font-weight="800"
              font-size="58" letter-spacing="-2" fill="url(#tg-grad${i})"
              class="t-fade-cycle"
              style="opacity: 0; animation-delay: ${i}s;">${n}</text>
      `).join('')}

      <text x="160" y="86" text-anchor="middle" fill="rgba(255,255,255,0.4)"
            font-size="9" letter-spacing="3" font-family="DM Mono, monospace" font-weight="500">
        POSSIBILITIES
      </text>

      <line x1="40" y1="105" x2="280" y2="105" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <!-- Mini jars grid: 5 columns, each fading at different rates -->
      ${[0,1,2,3,4].map(col => {
        const x = 60 + col * 45;
        return [0,1,2].map(row => {
          const y = 118 + row * 18;
          const hue = ['#ef4444', '#60a5fa', '#4ade80', '#fb923c', '#c084fc'][col];
          const delay = (col * 0.5 + row * 0.3).toFixed(2);
          return `<g transform="translate(${x}, ${y}) scale(0.32)" class="t-fade" style="animation-delay: ${delay}s;">${jarInner(hue)}</g>`;
        }).join('');
      }).join('')}
    </svg>`;
  }

  // ─── Slide definitions ───
  const tourSlides = [
    { title: 'slush solver', caption: 'a quick walkthrough · 5 steps', visual: vWelcome },
    { title: 'set your jars', caption: 'open settings · edit the inventory', visual: vInventory },
    { title: 'tap to place', caption: 'palette → fills the next empty slot', visual: vPlace },
    { title: 'mark each result', caption: 'tap below · ✓ correct · ✕ wrong', visual: vFeedback },
    { title: 'watch it narrow', caption: 'count drops · options fade · solved', visual: vSolver },
  ];

  // ─── Tour state + navigation ───
  let tourIdx = 0;

  function renderTour() {
    const content = document.getElementById('tour-content');
    content.innerHTML = '';
    tourSlides.forEach((slide, i) => {
      const div = document.createElement('div');
      div.className = 'tour-slide' + (i === tourIdx ? ' active' : '');
      div.innerHTML = `
        <div class="tour-visual">${slide.visual()}</div>
        <div class="tour-title">${slide.title}</div>
        <div class="tour-caption">${slide.caption}</div>
      `;
      content.appendChild(div);
    });
    // Dots
    const dots = document.getElementById('tour-dots');
    dots.innerHTML = '';
    tourSlides.forEach((_, i) => {
      const d = document.createElement('span');
      d.className = 'tour-dot' + (i === tourIdx ? ' active' : '');
      d.onclick = () => { tourIdx = i; renderTour(); };
      dots.appendChild(d);
    });
    // Back button
    const back = document.getElementById('tour-back');
    back.disabled = tourIdx === 0;
    // Next/Done button
    const cta = document.getElementById('tour-next');
    const label = document.getElementById('tour-next-label');
    const isLast = tourIdx === tourSlides.length - 1;
    cta.classList.toggle('final', isLast);
    label.textContent = isLast ? 'got it' : 'next';
  }

  function openTour() {
    tourIdx = 0;
    renderTour();
    document.getElementById('tour-overlay').classList.add('open');
  }
  function closeTour() {
    document.getElementById('tour-overlay').classList.remove('open');
    try { localStorage.setItem('slush-tour-seen', '1'); } catch (_) {}
  }

  document.getElementById('help-btn').onclick = openTour;
  document.getElementById('tour-close-btn').onclick = closeTour;
  document.getElementById('tour-back').onclick = () => {
    if (tourIdx > 0) { tourIdx--; renderTour(); }
  };
  document.getElementById('tour-next').onclick = () => {
    if (tourIdx < tourSlides.length - 1) { tourIdx++; renderTour(); }
    else closeTour();
  };
  // Click outside the modal to close
  document.getElementById('tour-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'tour-overlay') closeTour();
  });
  // ESC to close
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.getElementById('tour-overlay').classList.contains('open')) {
      closeTour();
    }
  });

  // Auto-open on first visit only; the help (?) button can reopen it anytime
  try {
    if (!localStorage.getItem('slush-tour-seen')) openTour();
  } catch (_) {
    // localStorage blocked (e.g. private mode) — just show the tour
    openTour();
  }

  // Init
  render();
</script>
</body>
</html>
